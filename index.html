<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irrational Convergence Explorer - 2^√3</title>
    
    <!-- 라이브러리 로드 (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:italic,wght@700&family=JetBrains+Mono&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #E4E3E0;
            color: #141414;
            margin: 0;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>

    <script>
        // Tailwind 설정
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

        // Sqrt(3) 데이터
        const SQRT3_DIGITS = "1.73205080756887729352744634150587236694280525381038062805580697945193301690883637814111742120675727339";

        function App() {
            const [visibleDigits, setVisibleDigits] = useState(1);
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                let interval;
                if (isPlaying && visibleDigits < 50) {
                    interval = setInterval(() => {
                        setVisibleDigits(prev => Math.min(prev + 1, 50));
                    }, 500);
                } else if (visibleDigits >= 50) {
                    setIsPlaying(false);
                }
                return () => clearInterval(interval);
            }, [isPlaying, visibleDigits]);

            const approximations = useMemo(() => {
                const data = [];
                for (let i = 1; i <= visibleDigits; i++) {
                    let str = SQRT3_DIGITS.substring(0, i);
                    if (str.endsWith('.')) continue;
                    const x = parseFloat(str);
                    const y = Math.pow(2, x);
                    data.push({ step: data.length + 1, x, y, label: str });
                }
                return data;
            }, [visibleDigits]);

            const finalValue = Math.pow(2, Math.sqrt(3));

            return (
                <div className="min-h-screen selection:bg-[#141414] selection:text-[#E4E3E0]">
                    {/* Header */}
                    <header className="border-b border-[#141414] p-6 flex justify-between items-center bg-[#E4E3E0]">
                        <div>
                            <h1 className="text-xs uppercase tracking-widest font-bold opacity-50 mb-1">Mathematical Exploration</h1>
                            <h2 className="text-3xl font-serif italic">The Convergence of 2<sup>√3</sup></h2>
                        </div>
                        <div className="flex gap-4">
                            <button 
                                onClick={() => setIsPlaying(!isPlaying)}
                                className={`px-4 py-2 border border-[#141414] text-xs uppercase tracking-widest font-bold transition-all ${isPlaying ? 'bg-[#141414] text-[#E4E3E0]' : 'hover:bg-[#141414] hover:text-[#E4E3E0]'}`}
                            >
                                {isPlaying ? 'Pause' : 'Start Sequence'}
                            </button>
                            <button 
                                onClick={() => { setVisibleDigits(1); setIsPlaying(false); }}
                                className="p-2 border border-[#141414] hover:bg-[#141414] hover:text-[#E4E3E0] transition-all"
                            >
                                <i data-lucide="refresh-cw" className="w-4 h-4"></i>
                            </button>
                        </div>
                    </header>

                    <main className="p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Left Column */}
                        <section className="lg:col-span-5 space-y-8">
                            <div className="bg-white/50 border border-[#141414] p-8 rounded-sm shadow-[4px_4px_0px_0px_rgba(20,20,20,1)]">
                                <div className="flex items-center gap-2 mb-6">
                                    <i data-lucide="calculator" className="w-4 h-4"></i>
                                    <h3 className="text-xs uppercase tracking-widest font-bold">Irrational Number: √3</h3>
                                </div>
                                <div className="font-mono text-4xl break-all leading-tight tracking-tighter">
                                    <span>{SQRT3_DIGITS.substring(0, visibleDigits)}</span>
                                    <span className="opacity-10">{SQRT3_DIGITS.substring(visibleDigits, 50)}</span>
                                    <span className="text-xl opacity-30 animate-pulse">...</span>
                                </div>
                                <p className="mt-6 text-sm leading-relaxed opacity-70">
                                    √3는 무리수로, 소수점 아래 숫자가 끝나지 않고 반복되지 않습니다. 자릿수가 늘어날수록 실제 값에 가까워지지만 완벽하게 도달할 수는 없습니다.
                                </p>
                            </div>

                            <AnimatePresence>
                                {visibleDigits >= 50 && (
                                    <motion.div 
                                        initial={{ opacity: 0, scale: 0.95 }}
                                        animate={{ opacity: 1, scale: 1 }}
                                        className="bg-[#141414] text-[#E4E3E0] p-8 rounded-sm shadow-[4px_4px_0px_0px_rgba(20,20,20,0.3)] border border-[#141414]"
                                    >
                                        <h3 className="text-xs uppercase tracking-widest font-bold mb-4 opacity-50">Conclusion</h3>
                                        <p className="text-xl font-serif italic leading-relaxed">
                                            "결국 이 값은 2의 루트 3제곱(2<sup>√3</sup>)으로 수렴하게 됩니다."
                                        </p>
                                        <div className="mt-4 pt-4 border-t border-white/10 font-mono text-sm opacity-70">
                                            Lim (x → √3) 2<sup>x</sup> = 2<sup>√3</sup>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            <div className="bg-white/50 border border-[#141414] p-8 rounded-sm shadow-[4px_4px_0px_0px_rgba(20,20,20,1)]">
                                <div className="flex items-center gap-2 mb-6">
                                    <i data-lucide="info" className="w-4 h-4"></i>
                                    <h3 className="text-xs uppercase tracking-widest font-bold">The Exponential Function</h3>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-end border-b border-[#141414]/10 pb-2">
                                        <span className="text-xs uppercase opacity-50">Current Exponent (x)</span>
                                        <span className="font-mono font-bold">{approximations[approximations.length - 1]?.x.toFixed(visibleDigits > 2 ? visibleDigits - 2 : 0)}</span>
                                    </div>
                                    <div className="flex justify-between items-end border-b border-[#141414]/10 pb-2">
                                        <span className="text-xs uppercase opacity-50">Result (2<sup>x</sup>)</span>
                                        <span className="font-mono font-bold text-xl">{approximations[approximations.length - 1]?.y.toFixed(12)}</span>
                                    </div>
                                    <div className="flex justify-between items-end pt-2">
                                        <span className="text-xs uppercase opacity-50">Target (2<sup>√3</sup>)</span>
                                        <span className="font-mono opacity-40">{finalValue.toFixed(12)}</span>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Right Column */}
                        <section className="lg:col-span-7 space-y-8">
                            <div className="bg-white border border-[#141414] p-6 rounded-sm shadow-[4px_4px_0px_0px_rgba(20,20,20,1)] h-[400px]">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xs uppercase tracking-widest font-bold">Convergence Graph</h3>
                                    <div className="text-[10px] uppercase opacity-50 font-mono">y = 2^x as x → √3</div>
                                </div>
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={approximations} margin={{ top: 20, right: 30, left: 20, bottom: 20 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#141414" strokeOpacity={0.1} vertical={false} />
                                        <XAxis dataKey="step" stroke="#141414" fontSize={10} tickLine={false} axisLine={{ stroke: '#141414' }} />
                                        <YAxis domain={['auto', 'auto']} stroke="#141414" fontSize={10} tickLine={false} axisLine={{ stroke: '#141414' }} tickFormatter={(val) => val.toFixed(4)} />
                                        <Tooltip contentStyle={{ backgroundColor: '#141414', border: 'none', color: '#E4E3E0', borderRadius: '0px', fontSize: '12px', fontFamily: 'monospace' }} />
                                        <ReferenceLine y={finalValue} stroke="#141414" strokeDasharray="3 3" />
                                        <Line type="monotone" dataKey="y" stroke="#141414" strokeWidth={2} dot={{ r: 2, fill: '#141414' }} animationDuration={300} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>

                            <div className="bg-white border border-[#141414] rounded-sm shadow-[4px_4px_0px_0px_rgba(20,20,20,1)] overflow-hidden">
                                <div className="p-4 border-b border-[#141414] flex justify-between items-center bg-[#141414] text-[#E4E3E0]">
                                    <h3 className="text-xs uppercase tracking-widest font-bold">Successive Approximations</h3>
                                    <span className="text-[10px] font-mono opacity-50">{approximations.length} Steps</span>
                                </div>
                                <div className="max-h-[300px] overflow-y-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="sticky top-0 bg-[#E4E3E0] z-10 border-b border-[#141414]">
                                            <tr>
                                                <th className="p-3 text-[10px] uppercase font-bold border-r border-[#141414]">Step</th>
                                                <th className="p-3 text-[10px] uppercase font-bold border-r border-[#141414]">Exponent (x)</th>
                                                <th className="p-3 text-[10px] uppercase font-bold">Result (2^x)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {approximations.slice().reverse().map((item) => (
                                                <tr key={item.step} className="border-b border-[#141414]/10 hover:bg-[#141414]/5 transition-colors">
                                                    <td className="p-3 font-mono text-xs border-r border-[#141414]/10">{item.step}</td>
                                                    <td className="p-3 font-mono text-xs border-r border-[#141414]/10 max-w-[200px] truncate">{item.label}</td>
                                                    <td className="p-3 font-mono text-xs">{item.y.toFixed(15)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="p-12 border-t border-[#141414] mt-12 bg-white/30">
                        <div className="max-w-4xl mx-auto space-y-6">
                            <h3 className="text-2xl font-serif italic">Why does this matter?</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm leading-relaxed opacity-80">
                                <p>수학에서 $2^{\sqrt{3}}$과 같은 지수는 단순한 반복 곱셈으로 정의되지 않습니다. $\sqrt{3}$이 무리수이기 때문에, 우리는 $\sqrt{3}$으로 수렴하는 유리수 수열(1.7, 1.73, 1.732...)을 지수로 하는 수열의 극한값으로 이를 정의합니다.</p>
                                <p>이 시각화는 지수의 정밀도가 높아짐에 따라 결과값이 안정화되어 특정 실수에 도달함을 보여줍니다. 이것이 지수를 정수와 분수에서 모든 실수로 확장하는 기초가 됩니다.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // 아이콘 초기화 및 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Lucide 아이콘 업데이트를 위한 처리
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
