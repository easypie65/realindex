<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irrational Convergence Explorer - 2^√3</title>
    
    <!-- 라이브러리 로드 (순서가 매우 중요합니다) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:italic,wght@700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #E4E3E0; color: #141414; margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
            <div style="text-align: center;">
                <div style="font-size: 20px; font-style: italic; margin-bottom: 10px;">수학적 탐구 로딩 중...</div>
                <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">잠시만 기다려 주세요</div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // Recharts 컴포넌트 안전하게 가져오기
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = window.Recharts;
        const { useState, useEffect, useMemo } = React;

        // SVG 아이콘 컴포넌트
        const Icons = {
            Calculator: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
            ),
            Info: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            ),
            Refresh: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            )
        };

        const SQRT3_DIGITS = "1.73205080756887729352744634150587236694280525381038062805580697945193301690883637814111742120675727339";

        function App() {
            const [visibleDigits, setVisibleDigits] = useState(1);
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                let interval;
                if (isPlaying && visibleDigits < 50) {
                    interval = setInterval(() => {
                        setVisibleDigits(prev => Math.min(prev + 1, 50));
                    }, 500);
                } else if (visibleDigits >= 50) {
                    setIsPlaying(false);
                }
                return () => clearInterval(interval);
            }, [isPlaying, visibleDigits]);

            const approximations = useMemo(() => {
                const data = [];
                for (let i = 1; i <= visibleDigits; i++) {
                    let str = SQRT3_DIGITS.substring(0, i);
                    if (str.endsWith('.')) continue;
                    const x = parseFloat(str);
                    const y = Math.pow(2, x);
                    data.push({ step: data.length + 1, x, y, label: str });
                }
                return data;
            }, [visibleDigits]);

            const finalValue = Math.pow(2, Math.sqrt(3));

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-xs uppercase tracking-widest font-bold opacity-50 mb-1">Mathematical Exploration</h1>
                            <h2 className="text-3xl font-serif italic">The Convergence of 2<sup>√3</sup></h2>
                        </div>
                        <div className="flex gap-3">
                            <button 
                                onClick={() => setIsPlaying(!isPlaying)}
                                className={`px-6 py-2 border border-[#141414] text-xs uppercase font-bold transition-all ${isPlaying ? 'bg-[#141414] text-[#E4E3E0]' : 'hover:bg-[#141414] hover:text-[#E4E3E0]'}`}
                            >
                                {isPlaying ? 'Pause' : 'Start Sequence'}
                            </button>
                            <button onClick={() => { setVisibleDigits(1); setIsPlaying(false); }} className="p-2 border border-[#141414] hover:bg-[#141414] hover:text-[#E4E3E0]">
                                <Icons.Refresh />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <section className="lg:col-span-5 space-y-6">
                            <div className="bg-white/60 border border-[#141414] p-6 shadow-[4px_4px_0px_0px_rgba(20,20,20,1)]">
                                <div className="flex items-center gap-2 mb-4"><Icons.Calculator /><h3 className="text-xs uppercase font-bold">Irrational Number: √3</h3></div>
                                <div className="font-mono text-3xl break-all leading-tight">
                                    <span>{SQRT3_DIGITS.substring(0, visibleDigits)}</span>
                                    <span className="opacity-10">{SQRT3_DIGITS.substring(visibleDigits, 50)}</span>
                                    <span className="opacity-30 animate-pulse">...</span>
                                </div>
                                <p className="mt-4 text-sm opacity-70">√3는 무리수로, 소수점 아래 숫자가 끝나지 않고 반복되지 않습니다.</p>
                            </div>

                            {visibleDigits >= 50 && (
                                <div className="bg-[#141414] text-[#E4E3E0] p-6 shadow-[4px_4px_0px_0px_rgba(20,20,20,0.3)] border border-[#141414]">
                                    <h3 className="text-xs uppercase font-bold mb-2 opacity-50">Conclusion</h3>
                                    <p className="text-lg font-serif italic">"결국 이 값은 2의 루트 3제곱(2<sup>√3</sup>)으로 수렴하게 됩니다."</p>
                                </div>
                            )}

                            <div className="bg-white/60 border border-[#141414] p-6 shadow-[4px_4px_0px_0px_rgba(20,20,20,1)]">
                                <div className="flex items-center gap-2 mb-4"><Icons.Info /><h3 className="text-xs uppercase font-bold">Current State</h3></div>
                                <div className="space-y-3 font-mono text-sm">
                                    <div className="flex justify-between border-b border-black/10 pb-1"><span>Exponent (x)</span><b>{approximations[approximations.length-1]?.x.toFixed(8)}</b></div>
                                    <div className="flex justify-between border-b border-black/10 pb-1"><span>Result (2^x)</span><b>{approximations[approximations.length-1]?.y.toFixed(10)}</b></div>
                                    <div className="flex justify-between opacity-40"><span>Target</span><span>{finalValue.toFixed(10)}</span></div>
                                </div>
                            </div>
                        </section>

                        <section className="lg:col-span-7 space-y-6">
                            <div className="bg-white border border-[#141414] p-4 shadow-[4px_4px_0px_0px_rgba(20,20,20,1)] h-[350px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={approximations} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} strokeOpacity={0.1} />
                                        <XAxis dataKey="step" hide />
                                        <YAxis domain={['auto', 'auto']} fontSize={10} tickFormatter={v => v.toFixed(3)} />
                                        <Tooltip contentStyle={{ fontSize: '10px', fontFamily: 'monospace' }} />
                                        <ReferenceLine y={finalValue} stroke="red" strokeDasharray="3 3" />
                                        <Line type="monotone" dataKey="y" stroke="#141414" strokeWidth={2} dot={false} isAnimationActive={false} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                            
                            <div className="bg-white border border-[#141414] shadow-[4px_4px_0px_0px_rgba(20,20,20,1)] overflow-hidden">
                                <div className="max-h-[250px] overflow-y-auto">
                                    <table className="w-full text-left text-xs font-mono">
                                        <thead className="bg-[#E4E3E0] sticky top-0 border-b border-black">
                                            <tr><th className="p-2">Step</th><th className="p-2">Exponent</th><th className="p-2">Result</th></tr>
                                        </thead>
                                        <tbody>
                                            {approximations.slice().reverse().slice(0, 20).map(item => (
                                                <tr key={item.step} className="border-b border-black/5 hover:bg-black/5">
                                                    <td className="p-2">{item.step}</td>
                                                    <td className="p-2">{item.label}</td>
                                                    <td className="p-2">{item.y.toFixed(12)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="max-w-4xl mx-auto mt-12 p-8 border-t border-black/20 text-sm opacity-80 leading-relaxed">
                        <h3 className="text-xl font-serif italic mb-4">Why does this matter?</h3>
                        <p>수학에서 2의 √3제곱과 같은 지수는 단순한 반복 곱셈으로 정의되지 않습니다. √3이 무리수이기 때문에, 우리는 √3으로 수렴하는 유리수 수열(1.7, 1.73, 1.732...)을 지수로 하는 수열의 극한값으로 이를 정의합니다.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
